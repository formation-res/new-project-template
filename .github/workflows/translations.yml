name: Keep translations current

on:
  push:
    branches: [main]
    paths:
      - "public/lang/en-US.ftl"
      - "config/locales.json"
      - "scripts/i18n-config.mjs"
      - "scripts/sync-translations.mjs"
      - ".github/workflows/translations.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: translations-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check translation credential
        id: credential
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY is not configured; automatic translation is disabled."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Synchronize translations
        if: steps.credential.outputs.available == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRANSLATION_MODEL: ${{ vars.TRANSLATION_MODEL }}
        run: npm run translations:sync

      - name: Validate translations
        if: steps.credential.outputs.available == 'true'
        run: npm run translations:check

      - name: Detect changes
        if: steps.credential.outputs.available == 'true'
        id: changes
        run: |
          if git diff --quiet -- public/lang; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open translation update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/update-translations-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add public/lang
          git commit -m "Update generated translations"
          git push --set-upstream origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Update generated translations" \
            --body "Synchronizes all generated Fluent catalogs with the current English source. Review language quality before merging."
