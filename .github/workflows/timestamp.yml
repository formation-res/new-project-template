name: Keep template timestamp current

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: template-timestamp-${{ github.repository }}
  cancel-in-progress: false

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Update timestamp
        run: |
          git pull --ff-only origin main
          node scripts/update-template-timestamp.mjs "$(git show -s --format=%cI HEAD)"
          node scripts/update-template-timestamp.mjs --check

      - name: Commit timestamp
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md MAINTAINERS.md docs src/templateMetadata.ts
          git commit -m "Update template timestamp [skip ci]"
          git push origin HEAD:main
